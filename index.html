<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Insight YouTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>CIY</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li class="active" data-tab="overview">Overview</li>
                    <li data-tab="video-audit">Video Audit</li>
                    <li data-tab="seo-keyword">SEO & Keyword</li>
                    <li data-tab="competitor">Competitor</li>
                    <li data-tab="action-plan">Action Plan</li>
                </ul>
            </nav>
            <div class="mode-status-pill" id="modeStatusBadge">Mode: Lite</div>
            <div class="ai-status-badge" id="aiStatusBadge">AI Gemini Active</div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <!-- Hero input -->
            <section class="hero">
                <input type="text" id="channelInput" placeholder="Enter YouTube Channel URL / Handle / ID">
                <button id="analyzeBtn">Analyze Channel</button>
                <input type="text" id="competitorInput" placeholder="Add Competitor @handle">
                <button id="addCompetitorBtn">Add Competitor</button>
            </section>

            <!-- Tabs content -->
            <section class="tab-content">
                <!-- Overview -->
                <div class="tab-panel active" id="overview">
                    <div class="stats-cards">
                        <div class="card">Subscribers: <span id="subCount">0</span></div>
                        <div class="card">Total Views: <span id="viewCount">0</span></div>
                        <div class="card">Total Videos: <span id="videoCount">0</span></div>
                        <div class="card">Channel Health: <span id="healthScore">0</span></div>
                    </div>
                    <div class="charts">
                        <canvas id="performanceTrend"></canvas>
                    </div>
                </div>

                <!-- Video Audit -->
                <div class="tab-panel" id="video-audit">
                    <table id="videoAuditTable">
                        <thead>
                            <tr>
                                <th>Video</th>
                                <th>Views</th>
                                <th>Likes</th>
                                <th>Comments</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- SEO & Keyword -->
                <div class="tab-panel" id="seo-keyword">
                    <div id="keywordPanel"></div>
                </div>

                <!-- Competitor -->
                <div class="tab-panel" id="competitor">
                    <div id="competitorCards"></div>
                </div>

                <!-- Action Plan -->
                <div class="tab-panel" id="action-plan">
                    <textarea id="actionPlan" placeholder="7-day action plan will appear here..." readonly></textarea>
                    <button id="copyReportBtn">Copy Report</button>
                    <button id="downloadPDFBtn">Download PDF</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
